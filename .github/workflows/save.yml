name: Save Lottery Data
on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and Save
        run: |
          curl -s "https://draw.ar-lottery01.com/TrxWinGo/TrxWinGo_1M/GetHistoryIssuePage.json" > data_$(date +'%Y%m%d_%H%M%S').json
          git config user.name "Bot"
          git config user.email "bot@users.noreply.github.com"
          git add *.json
          git commit -m "Auto save $(date)" || echo "No new data"
          git push
