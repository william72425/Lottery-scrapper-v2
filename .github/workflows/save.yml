name: Save Lottery Data
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Fetch lottery data
        run: |
          curl -s "https://draw.ar-lottery01.com/TrxWinGo/TrxWinGo_1M/GetHistoryIssuePage.json" > data_$(date +'%Y%m%d_%H%M%S').json
      
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff --staged --quiet || git commit -m "Auto save lottery data $(date +'%Y-%m-%d %H:%M:%S')"
          git push
